<!DOCTYPE html>
<html lang="en">
  <head>
    <title>About</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <style>
      body {
        margin: 0;
        padding: 18px;
        background: #e8e8e8;
        color: #111;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 74px;
        height: 31px;
        padding: 0 12px;
        border: 1px solid rgba(10, 10, 10, 0.7);
        border-radius: 10px;
        color: #111;
        text-decoration: none;
        font-size: 10px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      .card {
        border: 1px solid rgba(0, 0, 0, 0.28);
        border-radius: 20px;
        background: #f2f2f2;
        padding: 18px;
      }

      #about-content h1,
      #about-content h2,
      #about-content h3 {
        margin: 0 0 12px;
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 20px;
      }

      #about-content p,
      #about-content li {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24px;
        line-height: 1.24;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <a class="back-link" href="./index.html">Back</a>
      </div>
      <section class="card">
        <div id="about-content">Loading...</div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const aboutContent = document.getElementById("about-content");

      async function loadAboutContent() {
        try {
          const response = await fetch("./about.md");
          if (!response.ok) throw new Error("Could not load about.md");
          const markdown = await response.text();
          aboutContent.innerHTML = marked.parse(markdown);
        } catch (error) {
          aboutContent.innerHTML =
            "<h1>About</h1><p>Could not load about.md. Please make sure the file exists in the project root.</p>";
        }
      }

      loadAboutContent();
    </script>
  </body>
</html>
