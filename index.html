<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- PUT YOUR PAGE NAME -->
    <title>YOUR PAGE NAME</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="my-styles.css" />

    <!-- The following libraries and polyfills are recommended to maximize browser support -->
    <!-- NOTE: you must adjust the paths as appropriate for your project -->

    <!-- 💁 OPTIONAL: The :focus-visible polyfill removes the focus ring for some input types -->
    <script
      src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js"
      defer
    ></script>
  </head>

  <body>
    <!-- HERE IS WHERE THE MAGIC HAPPENS!
src = link to your glb asset
shadow-intensity= how visible you want your shadows to be
the rest leaveit as it is!-->

    <button id="info-button" aria-label="Open info page">Info</button>
    <button id="ar-button" aria-label="Open AR view">AR</button>
    <aside id="qr-panel" aria-label="QR code for mobile view">
      <p>Scan on mobile for AR</p>
      <div id="qr-code"></div>
    </aside>

    <section id="info-overlay" aria-hidden="true">
      <div class="info-content">
        <button id="close-info-button" aria-label="Close info popup">X</button>
        <div id="about-content">Loading...</div>
      </div>
    </section>

    <model-viewer
      id="main-model-viewer"
      src="./assets/cube.glb"
      shadow-intensity="3"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      autoplay
      ar-scale="auto"
      auto-rotate
    ></model-viewer>

    <!-- DO NOT DELETE! -->
    <footer>
      <p style="font-size: 7px">
        © your name *
        Lecture: Digital Design and Virtuality (2026) /
        <a href="https://martinamenegon.xyz/">Martina Menegon</a>
        *
        <a href="https://transmedialekunst.com/en/">Transmedia Art</a>
        *
        <a href="https://www.dieangewandte.at/">Die Angewandte</a>
      </p>
      <br />
    </footer>

    <!-- DO NOT DELETE! -->
    <!-- 💁 Include both scripts below to support all browsers! -->

    <!-- Loads <model-viewer> for modern browsers: -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      const infoButton = document.getElementById("info-button");
      const arButton = document.getElementById("ar-button");
      const closeInfoButton = document.getElementById("close-info-button");
      const infoOverlay = document.getElementById("info-overlay");
      const modelViewer = document.getElementById("main-model-viewer");
      const aboutContent = document.getElementById("about-content");
      const qrCodeContainer = document.getElementById("qr-code");

      let aboutLoaded = false;

      async function loadAboutContent() {
        if (aboutLoaded) return;

        try {
          const response = await fetch("./about.md");
          if (!response.ok) {
            throw new Error("Could not load about.md");
          }
          const markdown = await response.text();
          aboutContent.innerHTML = marked.parse(markdown);
          aboutLoaded = true;
        } catch (error) {
          aboutContent.innerHTML =
            "<h1>About</h1><p>Could not load about.md. Please make sure the file exists in the project root.</p>";
        }
      }

      async function openInfoPanel() {
        await loadAboutContent();
        infoOverlay.classList.add("is-visible");
        infoOverlay.setAttribute("aria-hidden", "false");
      }

      function closeInfoPanel() {
        infoOverlay.classList.remove("is-visible");
        infoOverlay.setAttribute("aria-hidden", "true");
      }

      function renderDesktopQrCode() {
        const isDesktop = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        if (!isDesktop || !qrCodeContainer) return;
        if (qrCodeContainer.childElementCount > 0) return;

        new QRCode(qrCodeContainer, {
          text: window.location.href,
          width: 108,
          height: 108,
          colorDark: "#ffffff",
          colorLight: "transparent",
          correctLevel: QRCode.CorrectLevel.M
        });
      }

      infoButton.addEventListener("click", openInfoPanel);
      closeInfoButton.addEventListener("click", closeInfoPanel);
      arButton.addEventListener("click", () => {
        modelViewer.activateAR();
      });
      renderDesktopQrCode();
    </script>
  </body>
</html>
