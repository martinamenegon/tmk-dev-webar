<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- PUT YOUR PAGE NAME -->
    <title>YOUR PAGE NAME</title>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="my-styles.css" />

    <!-- The following libraries and polyfills are recommended to maximize browser support -->
    <!-- NOTE: you must adjust the paths as appropriate for your project -->

    <!-- 💁 OPTIONAL: The :focus-visible polyfill removes the focus ring for some input types -->
    <script
      src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js"
      defer
    ></script>
  </head>

  <body>
    <!-- HERE IS WHERE THE MAGIC HAPPENS!
src = link to your glb asset
shadow-intensity= how visible you want your shadows to be
the rest leaveit as it is!-->

    <main class="page-layout">
      <header class="top-bar" aria-label="Page header">
        <button id="info-button" aria-label="Jump to about section">chimera name</button>
        <p class="credit-line">© name</p>
        <button id="ar-button" aria-label="Open AR view">AR</button>
      </header>

      <section class="viewer-card">
        <model-viewer
          id="main-model-viewer"
          src="./assets/cube.glb"
          shadow-intensity="3"
          ar
          ar-modes="webxr scene-viewer quick-look"
          ar-placement="floor"
          camera-controls
          autoplay
          ar-scale="auto"
          auto-rotate
        ></model-viewer>
      </section>

      <section id="about-section" class="about-panel" aria-label="About section">
        <h2>About:</h2>
        <div id="about-content">Loading...</div>
      </section>
    </main>

    <!-- DO NOT DELETE! -->
    <!-- 💁 Include both scripts below to support all browsers! -->

    <!-- Loads <model-viewer> for modern browsers: -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const infoButton = document.getElementById("info-button");
      const arButton = document.getElementById("ar-button");
      const modelViewer = document.getElementById("main-model-viewer");
      const aboutContent = document.getElementById("about-content");
      const aboutSection = document.getElementById("about-section");

      async function loadAboutContent() {
        try {
          const response = await fetch("./about.md");
          if (!response.ok) {
            throw new Error("Could not load about.md");
          }
          const markdown = await response.text();
          aboutContent.innerHTML = marked.parse(markdown);
        } catch (error) {
          aboutContent.innerHTML =
            "<h1>About</h1><p>Could not load about.md. Please make sure the file exists in the project root.</p>";
        }
      }

      infoButton.addEventListener("click", () => {
        aboutSection.scrollIntoView({ behavior: "smooth", block: "start" });
      });
      arButton.addEventListener("click", () => {
        modelViewer.activateAR();
      });
      loadAboutContent();
    </script>
  </body>
</html>
